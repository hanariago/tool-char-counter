<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E0DDD6;
    --text-primary: #1A1814;
    --text-secondary: #6B6660;
    --text-muted: #A8A49E;
    --accent: #3D6B5E;
    --accent-light: #EBF2EF;
    --accent-mid: #5A9A8A;
    --tag-bg: #F0EDE8;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 64px;
  }

  .lang-bar {
    position: absolute;
    top: 16px;
    right: 16px;
  }

  .lang-select {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    padding: 7px 10px;
    cursor: pointer;
    outline: none;
  }
  .lang-select:focus { border-color: var(--accent-mid); }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 680px;
    padding: 28px 28px 24px;
  }

  textarea {
    width: 100%;
    height: 240px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-size: 15px;
    line-height: 1.7;
    font-family: inherit;
    color: var(--text-primary);
    background: var(--bg);
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent-mid); }
  textarea::placeholder { color: var(--text-muted); }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 18px;
  }

  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    transition: background 0.15s;
  }

  .stat-box.highlight {
    background: var(--accent-light);
    border-color: #B8D6CE;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 40px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -1.5px;
    line-height: 1;
  }

  .stat-box.highlight .stat-value { color: var(--accent); }

  .stat-unit {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-left: 4px;
  }

  .stat-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  .extra-stats {
    margin-top: 14px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
  }

  .mini-stat {
    background: var(--tag-bg);
    border-radius: 8px;
    padding: 12px 14px;
    text-align: center;
  }

  .mini-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    letter-spacing: 0.04em;
  }

  .mini-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: -0.5px;
  }

  .clear-btn {
    margin-top: 18px;
    width: 100%;
    padding: 11px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: transparent;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
    letter-spacing: 0.02em;
  }

  .clear-btn:hover {
    background: var(--tag-bg);
    color: var(--text-primary);
  }

  /* 콘텐츠 (SEO/AEO: 보이는 설명 + FAQ) */
  .content {
    width: 100%;
    max-width: 680px;
    margin-top: 26px;
  }

  .intro {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 22px;
    font-size: 13.5px;
    line-height: 1.85;
    color: var(--text-secondary);
  }

  .faq { margin-top: 18px; }

  .faq h2 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
    margin: 0 0 12px 2px;
  }

  .faq details {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .faq summary {
    cursor: pointer;
    padding: 14px 44px 14px 18px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    list-style: none;
    position: relative;
  }
  .faq summary::-webkit-details-marker { display: none; }
  .faq summary::after {
    content: "+";
    position: absolute;
    right: 18px;
    top: 13px;
    font-size: 16px;
    color: var(--text-muted);
  }
  .faq details[open] summary::after { content: "\2212"; }

  .faq .faq-a {
    padding: 0 18px 16px;
    font-size: 13px;
    line-height: 1.75;
    color: var(--text-secondary);
  }

  footer {
    margin-top: 28px;
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.03em;
    line-height: 1.8;
  }

  footer a {
    color: var(--text-secondary);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
  }
  footer a:hover { color: var(--accent); }
</style>
</head>

  const LOCALE = { ko: "ko_KR", en: "en_US", ja: "ja_JP", zh: "zh_CN", es: "es_ES" };
  let currentLang = "ko";

  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // ── 언어 적용 ──────────────────────────────
  function setLang(lang) {
    if (!I18N[lang]) lang = "en";
    currentLang = lang;
    const t = I18N[lang];

    document.documentElement.lang = lang;
    document.title = t.metaTitle;

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key]) el.textContent = t[key];
    });
    const ta = document.querySelector('[data-i18n-ph]');
    if (ta) ta.placeholder = t[ta.getAttribute('data-i18n-ph')];

    // 콘텐츠 + FAQ
    document.getElementById('introText').textContent = t.intro;
    document.getElementById('faqTitle').textContent = t.faqTitle;
    document.getElementById('faqList').innerHTML = t.faq.map(item =>
      '<details><summary>' + esc(item.q) + '</summary><div class="faq-a">' + esc(item.a) + '</div></details>'
    ).join('');

    const ogLocale = document.querySelector('meta[property="og:locale"]');
    if (ogLocale) ogLocale.setAttribute('content', LOCALE[lang]);

    const sel = document.getElementById('langSelect');
    if (sel) sel.value = lang;

    try { localStorage.setItem('ccLang', lang); } catch (e) {}

    countChars(); // 단위 텍스트 갱신
  }

  // ── 카운트 ──────────────────────────────
  // 이모지 등 서로게이트 쌍을 1자로 세기 위해 코드포인트 단위로 길이 측정
  function charLen(s) { return [...s].length; }

  function countChars() {
    const text = document.getElementById('inputText').value;
    const unit = I18N[currentLang].unit;

    const withSpace = charLen(text);
    const withoutSpace = charLen(text.replace(/\s/g, ''));
    const lines = text === '' ? 0 : text.split('\n').length;
    const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
    const sentences = text.trim() === '' ? 0 : (text.match(/[.!?。！？]+/g) || []).length;
    const bytes = new TextEncoder().encode(text).length;

    setVal('withSpace', withSpace, unit);
    setVal('withoutSpace', withoutSpace, unit);
    document.getElementById('lineCount').textContent = lines.toLocaleString();
    document.getElementById('wordCount').textContent = words.toLocaleString();
    document.getElementById('sentenceCount').textContent = sentences.toLocaleString();
    document.getElementById('byteCount').textContent = bytes.toLocaleString();
  }

  function setVal(id, num, unit) {
    document.getElementById(id).innerHTML =
      num.toLocaleString() + '<span class="stat-unit">' + unit + '</span>';
  }

  function clearText() {
    document.getElementById('inputText').value = '';
    countChars();
  }

  // ── 초기 언어 결정: ?lang= → localStorage → 브라우저 → ko ──
  (function initLang() {
    const param = new URLSearchParams(location.search).get('lang');
    let saved = null;
    try { saved = localStorage.getItem('ccLang'); } catch (e) {}
    const nav = (navigator.language || 'ko').slice(0, 2).toLowerCase();
    const pick = [param, saved, nav, 'ko'].find(l => l && I18N[l]) || 'ko';
    setLang(pick);
  })();
</script>
